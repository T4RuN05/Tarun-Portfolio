<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <!-- Filter to create a pronounced ghostly noise effect on solid lines -->
    <filter id="ghostNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" result="noise" />
      <!-- Medium displacement scale to match medium stroke -->
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" result="displaced" />
      <!-- Medium blur for the ghostly glow -->
      <feGaussianBlur in="displaced" stdDeviation="1.2" result="blurred" />
      <!-- Merge the core shape with the blurred ghost edge -->
      <feMerge>
        <feMergeNode in="blurred" />
        <feMergeNode in="displaced" />
      </feMerge>
    </filter>
  </defs>

  <!-- Thick solid lines, sparse scattered pattern -->
  <g fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#ghostNoise)" opacity="0.9">
    <g transform="translate(140, 140) scale(1)">
      <!-- < -->
      <path d="M 20,0 L 0,25 L 20,50" />
      <!-- / -->
      <path d="M 50,-10 L 30,60" />
      <!-- > -->
      <path d="M 60,0 L 80,25 L 60,50" />
    </g>
    <g transform="translate(20, 40) scale(0.8)">
      <path d="M 20,0 L 0,25 L 20,50" />
      <path d="M 50,-10 L 30,60" />
      <path d="M 60,0 L 80,25 L 60,50" />
    </g>
    <g transform="translate(300, 30) scale(0.9)">
      <path d="M 20,0 L 0,25 L 20,50" />
      <path d="M 50,-10 L 30,60" />
      <path d="M 60,0 L 80,25 L 60,50" />
    </g>
    <g transform="translate(40, 300) scale(0.9)">
      <path d="M 20,0 L 0,25 L 20,50" />
      <path d="M 50,-10 L 30,60" />
      <path d="M 60,0 L 80,25 L 60,50" />
    </g>
    <g transform="translate(280, 260) scale(0.8)">
      <path d="M 20,0 L 0,25 L 20,50" />
      <path d="M 50,-10 L 30,60" />
      <path d="M 60,0 L 80,25 L 60,50" />
    </g>
  </g>
</svg>
